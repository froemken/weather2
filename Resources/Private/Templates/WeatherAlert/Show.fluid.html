<html lang="en"
      xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default"/>

<f:section name="main">
    <f:if condition="{weatherAlerts}">
        <f:for each="{weatherAlerts}" as="weatherAlert">
            <f:render partial="WeatherAlert/WeatherAlert" arguments="{weatherAlert: weatherAlert}"/>
        </f:for>
    </f:if>
</f:section>
</html>
